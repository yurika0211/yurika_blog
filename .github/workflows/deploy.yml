name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── 构建并推送镜像到 GitHub Container Registry ──
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: frontend
            context: ./my-blog
            image_suffix: frontend
          - name: backend
            context: ./my-blog-backend
            image_suffix: backend
          - name: chat-ai
            context: ./chat-ai
            image_suffix: chat-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_CHAT_API_BASE_URL=${{ secrets.VITE_CHAT_API_BASE_URL }}

  # ── SSH 到服务器拉取镜像并重启服务 ──
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # 登录 GitHub Container Registry
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 定义镜像名（全小写）
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            FRONTEND="ghcr.io/${REPO}-frontend:latest"
            BACKEND="ghcr.io/${REPO}-backend:latest"
            CHAT_AI="ghcr.io/${REPO}-chat-ai:latest"

            # 拉取最新镜像
            docker pull "$FRONTEND"
            docker pull "$BACKEND"
            docker pull "$CHAT_AI"

            # 进入部署目录并更新服务
            cd /opt/blog

            # 用拉取的镜像启动服务（使用生产版 compose 文件）
            export FRONTEND_IMAGE="$FRONTEND"
            export BACKEND_IMAGE="$BACKEND"
            export CHAT_AI_IMAGE="$CHAT_AI"
            docker compose -f docker-compose.prod.yml up -d --force-recreate frontend backend chat-ai

            # 清理旧镜像
            docker image prune -f

            echo "✅ Deploy complete!"
