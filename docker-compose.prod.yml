# docker-compose.prod.yml — 生产部署（手动提交到服务器）
#
# 首次部署步骤：
#   1. 复制 .env.example 为 .env，填入密码和域名
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. 申请 SSL 证书（见下方注释）
#
# 首次申请证书：
#   docker compose -f docker-compose.prod.yml run --rm certbot \
#     certonly --webroot -w /var/www/certbot \
#     -d yurika0408.icu -d www.yurika0408.icu \
#     --email your-email@example.com --agree-tos --no-eff-email
#
# 申请完成后重启 nginx 加载证书：
#   docker compose -f docker-compose.prod.yml restart nginx

services:
  # ── Reverse Proxy (SSL termination) ──
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    networks:
      - frontend
    depends_on:
      - frontend
      - backend
      - chat-ai
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Let's Encrypt certificate manager ──
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # 自动续期（每12小时检查一次）
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done'"
    networks: []

  # ── Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-sql/10_blog.sql:/docker-entrypoint-initdb.d/10_blog.sql:ro
      - ./init-sql/20_chat_ai.sql:/docker-entrypoint-initdb.d/20_chat_ai.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API ──
  backend:
    image: ${BACKEND_IMAGE:-blog-backend:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
    networks:
      - internal
      - frontend
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (static files via internal nginx) ──
  frontend:
    image: ${FRONTEND_IMAGE:-blog-frontend:latest}
    restart: unless-stopped
    networks:
      - frontend
    depends_on:
      - backend
      - chat-ai
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Chat AI ──
  chat-ai:
    image: ${CHAT_AI_IMAGE:-blog-chat-ai:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?sslmode=disable
    networks:
      - internal
      - frontend
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    internal: true
  frontend:

volumes:
  pgdata:
  certbot-webroot:
  certbot-certs:
