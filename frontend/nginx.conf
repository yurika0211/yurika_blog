server {
  listen 80;
  server_name localhost;

  # Root directory for static files
  root /usr/share/nginx/html;
  index index.html index.htm;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Serve static files directly
  location / {
    # Try to serve the requested file, then a directory,
    # and finally fall back to index.html for SPA routing.
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets with hashed filenames for 1 year
  location ~* \.(?:css|js|woff2?|svg|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Short cache for favicon and HTML
  location ~* \.(?:ico|html)$ {
    expires 1d;
    add_header Cache-Control "public";
  }
}
